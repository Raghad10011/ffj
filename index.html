<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Quiz</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  background: linear-gradient(180deg, #2a1f5a, #0f172a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  overflow: hidden;
}

/* نجوم */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.15;
  animation: moveStars 80s linear infinite;
}

@keyframes moveStars {
  from {transform: translateY(0);}
  to {transform: translateY(-1000px);}
}

/* الجهاز */
.arcade-container {
  position: relative;
  width: 100%;
  max-width: 500px;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.arcade-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* الشاشة البيضاء */
.screen {
  position: absolute;
  top: 24%;
  left: 50%;
  transform: translateX(-50%);
  width: 66%;
  height: 38%;

  background: #ffffff;
  border-radius: 12px;
  padding: 15px;
  color: black;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
}

/* الشريط */
.top-bar {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

/* السؤال */
.question {
  text-align: center;
  font-size: 20px;
  margin: 10px 0;
}

/* الخيارات */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option {
  background: #e5e7eb;
  color: black;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}

.option:hover {
  background: #cbd5f5;
  transform: scale(1.05);
}

/* الأزرار */
.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.controls button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background: #ff4da6;
  color: white;
  cursor: pointer;
}

/* موبايل */
@media (max-width: 768px) {
  .screen {
    width: 70%;
    height: 40%;
  }

  .question {
    font-size: 5vw;
  }

  .top-bar {
    font-size: 3.5vw;
  }

  .option {
    font-size: 4vw;
    padding: 3vw;
  }

  .controls button {
    font-size: 3.5vw;
    padding: 2vw 4vw;
  }
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="arcade-container">
  
<img src="https://i.imgur.com/iHKHWpF.jpeg" class="arcade-img">

  <div class="screen">

    <div class="top-bar">
      <span id="level">Level 1</span>
      <span id="score">Score: 0</span>
    </div>

    <div class="question" id="question"></div>

    <div class="options" id="options"></div>

    <div class="controls">
      <button onclick="nextQuestion()">Next</button>
      <button onclick="restartGame()">Restart</button>
    </div>

  </div>

</div>

<script>
const questions = [
  {
    q: "كم عدد كواكب المجموعة الشمسية؟",
    options: ["7", "8", "9", "10"],
    answer: 1
  },
  {
    q: "عاصمة السعودية؟",
    options: ["جدة", "الرياض", "مكة", "الدمام"],
    answer: 1
  },
  {
    q: "2 + 2 = ؟",
    options: ["3", "4", "5", "6"],
    answer: 1
  }
];

let current = 0;
let score = 0;

function loadQuestion() {
  const q = questions[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("level").innerText = "Level " + (current + 1);
  document.getElementById("score").innerText = "Score: " + score;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, index) => {
    const div = document.createElement("div");
    div.classList.add("option");
    div.innerText = opt;

    div.onclick = () => {
      if (index === q.answer) {
        score++;
        div.style.background = "green";
      } else {
        div.style.background = "red";
      }

      setTimeout(() => {
        nextQuestion();
      }, 700);
    };

    optionsDiv.appendChild(div);
  });
}

function nextQuestion() {
  current = (current + 1) % questions.length;
  loadQuestion();
}

function restartGame() {
  current = 0;
  score = 0;
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
